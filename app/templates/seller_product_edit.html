{% extends 'base.html' %}
{% block title %}Edit Product | SmartMarket{% endblock %}
{% block content %}
<section class="dashboard narrow">
  <div class="dash-header"><div><h1>Edit Product</h1><p>Update product information, stock and category.</p></div></div>
  <div class="panel">
    <form method="POST" enctype="multipart/form-data" class="product-form">
      <div class="form-grid">
        <div><label>Product Name</label><input type="text" name="name" value="{{ product.name }}" required></div>
        <div><label>Category</label><select name="category_id" required>{% for c in categories %}<option value="{{ c.id }}" {% if c.id == product.category_id %}selected{% endif %}>{{ c.name }}</option>{% endfor %}</select></div>
        <div><label>Price</label><input type="number" name="price" min="0" step="0.01" value="{{ product.price }}" required></div>
        <div><label>Currency</label><select name="currency"><option value="RWF" {% if product.currency == 'RWF' %}selected{% endif %}>RWF</option><option value="USD" {% if product.currency == 'USD' %}selected{% endif %}>USD</option></select></div>
        <div><label>Stock</label><input type="number" name="stock" min="0" value="{{ product.stock }}"></div>
        <div><label>Image</label><input type="file" name="image" accept="image/*"></div>
      </div>
      <label>Description</label><textarea name="description" rows="3">{{ product.description }}</textarea>
      <label class="check"><input type="checkbox" name="is_active" {% if product.is_active %}checked{% endif %}> Product is active and visible to buyers</label>
      <button class="btn btn-primary" type="submit">Save Product</button>
      <a class="btn btn-outline" href="{{ url_for('routes.seller_dashboard') }}">Cancel</a>
    </form>
  </div>
</section>
{% endblock %}
