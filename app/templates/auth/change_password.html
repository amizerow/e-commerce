{% extends 'base.html' %}
{% block title %}Change Password | SmartMarket v2{% endblock %}
{% block content %}<section class="auth-wrap"><div class="auth-card"><h1>Change Password</h1><p class="muted">Use a strong password. Required after password expiry.</p><form method="POST">{% if not current_user.password_reset_required %}<label>Current Password</label><input type="password" name="current_password">{% endif %}<label>New Password</label><input type="password" name="new_password" required><label>Confirm New Password</label><input type="password" name="confirm_password" required><button class="btn btn-primary full" type="submit">Update Password</button></form></div></section>{% endblock %}
